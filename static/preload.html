<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="Games & Stuff Logo (1).png" type="image/png"/>
  <title>Games & Stuff</title>
  <link rel="stylesheet" href="style.css">
  <link href='https://fonts.googleapis.com/css?family=Lato:wght@700' rel='stylesheet' type='text/css'>
  <style>
    /* Style the container to center the dropdown */
    .container {
      text-align: center;
    }

    /* Style the custom dropdown container */
    .custom-dropdown {
      position: relative;
      display: inline-block;
    }

    /* Style the dropdown button */
    .dropdown-button {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoGmNsZ2p8hz5XsrmMkoEGwOlGy7R1vEQXKuP0KkmlgxhUPs-4');
      background-size: cover;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 19px;
      width: 200px; /* Adjust the width as needed */
    }

    /* Style the dropdown options container */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #333;
      border-radius: 5px;
      width: 200px;
      z-index: 1;
    }

    /* Style the dropdown options */
    .dropdown-option {
      padding: 9px 16px;
      color: #fff;
      text-align: center;
      cursor: pointer;
      font-family: 'Lato', sans-serif; /* Apply the Lato font to option text */
    }

    /* Show the options when the button is clicked */
    .custom-dropdown.active .dropdown-content {
      display: block;
    }
  </style>
</head>
<body>
  <nav>
    <p id="time"></p>
    <div class="navitems" style="background-color: rgba(0, 0, 0, 0.17); border-radius: 0 0 15px 15px">
      <div class="navitem" style="background-color: rgba(0, 0, 0, 0.2); border-radius: 15px 0 0 15px;"><a href="/games">Games</a></div>
      <div class="navitem" style="background-color: rgba(0, 0, 0, 0.2); border-radius: 0 15px 15px 0;"><a href="/apps">Apps</a></div>
      <a href="/" class="mainNAVimage-container">
        <img src="G&S nav.png" class="mainNAVimage">
      </a>                                                                           
      <div class="navitem" style="background-color: rgba(0, 0, 0, 0.2); border-radius: 15px 0 0 15px;"><a href="/chat">Chat</a></div>
      <div class="navitem" style="background-color: rgba(0, 0, 0, 0.2); border-radius: 0 15px 15px 0;"><a selected href="/settings">Settings</a></div>
    </div>
  </nav>
  <div style="padding-top: 139px">
    <div class="GameContainer">
      <div class="FrameContainer">
        <iframe allowfullscreen="true" frameborder="0" id="frame"></iframe>
        <div id="GameInfo">
          <div class="GameTitle">
            <img id="GameImage" alt="icon" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="custom-dropdown" onclick="toggleDropdown()">
      <button class="dropdown-button">Select A Cloak</button>
      <div class="dropdown-content">
        <div class="dropdown-option" onclick="selectOption('Google Slides', 'https://ssl.gstatic.com/docs/doclist/images/mediatype/icon_1_presentation_x16.png')">Google Slides Cloak</div>
        <div class="dropdown-option" onclick="selectOption('My Drive - Google Drive', 'https://drive.google.com/favicon.ico')">Google Drive Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Google Docs', 'https://ssl.gstatic.com/docs/doclist/images/mediatype/icon_1_document_x16.png')">Google Docs Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Home', 'https://edu.google.com/images/svg/gsuite-icons/classroom.svg')">Classroom Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Google', 'https://google.com/favicon.ico')">Google Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Infinite Campus', 'https://www.infinitecampus.com/favicon.ico')">Infinite Campus Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Your Sets | Quizlet', 'https://quizlet.com/favicon.ico')">Quizlet Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Dashboard', 'https://jackson.instructure.com/favicon.ico')">Canvas Cloak</div>
        <div class="dropdown-option" onclick="selectOption('Clever | Log in', 'https://assets.clever.com/oauth/3b8aa8ff1c6e6c2c353abcf2694107ca9a53126d/favicon.ico?1')">Clever Cloak</div>
        <div class="dropdown-option" onclick="selectOption('IXL | Dashboard', 'https://ixl.com/favicon.ico')">IXL Cloak</div>
      </div>
    </div>
  </div>

  <script>
    var commonIframeUrl = "";
    var dropdownActive = false;

    function toggleDropdown() {
      dropdownActive = !dropdownActive;
      var dropdownContent = document.querySelector('.dropdown-content');
      if (dropdownActive) {
        dropdownContent.style.display = 'block';
      } else {
        dropdownContent.style.display = 'none';
      }
    }

    function selectOption(title, faviconUrl) {
      toggleDropdown();
      openFullscreen(title, faviconUrl);
    }

    function openFullscreen(title, faviconUrl) {
      var win = window.open('about:blank', '_blank');

      var favicon = win.document.createElement('link');
      favicon.rel = 'shortcut icon';
      favicon.href = faviconUrl;
      favicon.type = 'image/x-icon';
      win.document.head.appendChild(favicon);

      win.document.title = title.replace(/_PIPE_/g, '|'); // Replace _PIPE_ with |

      var iframe = win.document.createElement('iframe');
      iframe.src = commonIframeUrl;
      iframe.style.position = 'absolute';
      iframe.style.top = '0';
      iframe.style.left = '0';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = 'none';
      win.document.body.appendChild(iframe);
    }
  </script>
</body>
</html>
