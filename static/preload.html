<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    /* Style the container to center the dropdown */
    .container {
      text-align: center;
    }

    /* Style the custom dropdown container */
    .custom-dropdown {
      position: relative;
      display: inline-block;
    }

    /* Style the dropdown button */
    .dropdown-button {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoGmNsZ2p8hz5XsrmMkoEGwOlGy7R1vEQXKuP0KkmlgxhUPs-4');
      background-size: cover;
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 19px;
      width: 200px; /* Adjust the width as needed */
    }

    /* Style the dropdown options container */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #333;
      border-radius: 5px;
      width: 200px;
      z-index: 1;
    }

    /* Style the dropdown options */
    .dropdown-option {
      padding: 9px 16px;
      color: #fff;
      text-align: center;
      cursor: pointer;
      font-family: 'Lato', sans-serif; /* Apply the Lato font to option text */
    }

    /* Show the options when the button is clicked */
    .custom-dropdown.active .dropdown-content {
      display: block;
    }
  </style>
</head>

        <script>
          const games = {
            "slope": {
              "url": "https://kdata1.com/2020/05/slope/",
              "image": "snake.jpg",
              "description": "A classic snake game."
            },
            "OvO": {

              "image": "snake.jpg",
              "description": "asdcasd."
            },
          };

          // Get the game name from the query parameter
          const params = new URLSearchParams(window.location.search);
          const gameName = params.get('game');

          // Find the selected game
          const selectedGame = games[gameName];

          if (selectedGame) {
            // Set the iframe src, game title, and image
            const iframe = document.getElementById('frame');
            const gameTitle = document.getElementById('GameTitle');
            const gameImage = document.getElementById('GameImage');

            iframe.src = selectedGame.url;
            gameTitle.textContent = gameName;
            gameImage.src = selectedGame.image;

            // Pass the selected game URL to the second code
            const secondCodeScript = document.createElement('script');
            secondCodeScript.textContent = `var gameUrl = "${selectedGame.url}";`;
            document.head.appendChild(secondCodeScript);
          } else {
            console.error('Game not found');
          }
        </script>

      </div>
    </div>

  <script>
    var commonIframeUrl = window.gameUrl || "";
    var dropdownActive = false;

    function toggleDropdown() {
      dropdownActive = !dropdownActive;
      var dropdownContent = document.querySelector('.dropdown-content');
      if (dropdownActive) {
        dropdownContent.style.display = 'block';
      } else {
        dropdownContent.style.display = 'none';
      }
    }

    function selectOption(title, faviconUrl) {
      toggleDropdown();
      openFullscreen(title, faviconUrl);
    }

    function openFullscreen(title, faviconUrl) {
      var win = window.open('about:blank', '_blank');

      var favicon = win.document.createElement('link');
      favicon.rel = 'shortcut icon';
      favicon.href = faviconUrl;
      favicon.type = 'image/x-icon';
      win.document.head.appendChild(favicon);

      win.document.title = title.replace(/_PIPE_/g, '|'); // Replace _PIPE_ with |

      var iframe = win.document.createElement('iframe');
      iframe.src = commonIframeUrl;
      iframe.style.position = 'absolute';
      iframe.style.top = '0';
      iframe.style.left = '0';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = 'none';
      win.document.body.appendChild(iframe);
    }
  </script>
