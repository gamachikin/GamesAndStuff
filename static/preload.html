<div class="GameContainer">
  <iframe allowfullscreen="true" frameborder="0" id="frame"></iframe>
  <div id="GameInfo">
    <div class="GameTitle">
      <img id="GameImage" alt="icon" />
    </div>
  </div>

  <script>
    const games = {
      "snake": {
        "url": "https://example.com/snake",
        "image": "snake.jpg",
        "description": "A classic snake game."
      },
      // Add more games as needed
    };

    // Get the game name from the query parameter
    const params = new URLSearchParams(window.location.search);
    const gameName = params.get('game');

    // Find the selected game
    const selectedGame = games[gameName];

    if (selectedGame) {
      // Set the iframe src, game title, and image
      const iframe = document.getElementById('frame');
      const gameTitle = document.getElementById('GameTitle');
      const gameImage = document.getElementById('GameImage');

      iframe.src = selectedGame.url;
      gameTitle.textContent = gameName;
      gameImage.src = selectedGame.image;
    } else {
      console.error('Game not found');
    }
  </script>

</div>

  </body>
