<div class="container" style="padding-top: 125px">
        <h1>Edit Tab Name and Icon</h1>
        <form id="editForm">
            <label for="tabName">Tab Name:</label>
            <input type="text" id="tabName" placeholder="Enter Tab Name"><br>
            <label for="iconUrl">Icon URL:</label>
            <input type="text" id="iconUrl" placeholder="Enter Icon URL"><br>
            <button type="submit">Update</button>
            <button type="button" id="resetBtn">Reset</button>
        </form>
    </div>
<style>
.container {
    margin: 20px auto;
    padding: 20px;
    max-width: 300px;
    text-align: center;
}

label {
    display: block;
    margin-bottom: 5px;
    text-align: center;
}

input[type="text"] {
    width: 100%;
    margin-bottom: 10px;
    box-sizing: border-box;
    text-align: center;
    background-color: #f0f0f0; /* Same color as text boxes */
}

button {
    width: calc(50% - 5px); /* Adjusted button width */
    padding: 10px;
    color: #333; /* Text color */
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 20px; /* Increased margin-top */
    margin-right: 5px; /* Added margin-right */
}

button:last-child {
    margin-right: 0; /* Remove margin-right for last button */
}

button:hover {
    background-color: #cce5ff; /* Hover color */
}

</style>
<script>
// Store original tab name and icon URL
var originalTabName = document.title;
var originalIconUrl = getFaviconUrl();

document.getElementById('editForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    var tabName = document.getElementById('tabName').value;
    var iconUrl = document.getElementById('iconUrl').value;

    document.title = tabName;
    updateFavicon(iconUrl);
});

document.getElementById('resetBtn').addEventListener('click', function() {
    document.title = originalTabName;
    updateFavicon(originalIconUrl);
});

// Function to get the current favicon URL
function getFaviconUrl() {
    var favicon = document.querySelector("link[rel~='icon']");
    return favicon ? favicon.href : '';
}

// Function to update the favicon
function updateFavicon(iconUrl) {
    var link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.type = 'image/x-icon';
    link.rel = 'icon';
    link.href = iconUrl;
    document.getElementsByTagName('head')[0].appendChild(link);
}
</script>
