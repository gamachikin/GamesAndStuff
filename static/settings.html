<div class="container" style="padding-top: 125px">
        <h1>Custom Tab Cloaks</h1>
        <form id="editForm">
            <label for="tabName">Tab Name:</label>
            <input type="text" id="tabName" placeholder="Enter Tab Name"><br>
            <label for="iconUrl">Icon URL:</label>
            <input type="text" id="iconUrl" placeholder="Enter Icon URL"><br>
            <button type="submit">Update</button>
            <button type="button" id="resetBtn">Reset</button>
        </form>
    </div>
<style>
.container {
    margin: 20px auto;
    padding: 20px;
    max-width: 300px;
    text-align: center;
}

label {
    display: block;
    margin-bottom: 5px;
    text-align: center;
}

input[type="text"] {
    width: 100%;
    margin-bottom: 10px;
    box-sizing: border-box;
    text-align: center;
    background-color: #f0f0f0; /* Same color as text boxes */
}

button {
    width: calc(50% - 5px); /* Adjusted button width */
    padding: 10px;
    color: #333; /* Text color */
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 20px; /* Increased margin-top */
    margin-right: 5px; /* Added margin-right */
}

button:last-child {
    margin-right: 0; /* Remove margin-right for last button */
}

button:hover {
    background-color: #cce5ff; /* Hover color */
}

</style>
<script>
// Store original tab name and icon URL
var originalTabName = document.title;
var originalIconUrl = getFaviconUrl();

document.getElementById('editForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    var tabName = document.getElementById('tabName').value;
    var iconUrl = document.getElementById('iconUrl').value;

    document.title = tabName;
    updateFavicon(iconUrl);
});

document.getElementById('resetBtn').addEventListener('click', function() {
    document.title = originalTabName;
    updateFavicon(originalIconUrl);
});

// Function to get the current favicon URL
function getFaviconUrl() {
    var favicon = document.querySelector("link[rel~='icon']");
    return favicon ? favicon.href : '';
}

// Function to update the favicon
function updateFavicon(iconUrl) {
    var link = document.querySelector("link[rel~='icon']") || document.createElement('link');
    link.type = 'image/x-icon';
    link.rel = 'icon';
    link.href = iconUrl;
    document.getElementsByTagName('head')[0].appendChild(link);
}
</script>

<body>
    <script>
        var dropdownActive = false;

        function toggleDropdown() {
            dropdownActive = !dropdownActive;
            var dropdownContent = document.querySelector('.dropdown-content');
            if (dropdownActive) {
                dropdownContent.style.display = 'block';
            } else {
                dropdownContent.style.display = 'none';
            }
        }

        function selectOption(title, faviconUrl) {
            toggleDropdown();
            openFullscreen(title, faviconUrl);
        }

        function openFullscreen(title, faviconUrl) {
            var win = window.open('about:blank', '_blank');

            var favicon = win.document.createElement('link');
            favicon.rel = 'shortcut icon';
            favicon.href = faviconUrl;
            favicon.type = 'image/x-icon';
            win.document.head.appendChild(favicon);

            win.document.title = title;

            var iframe = win.document.createElement('iframe');
            iframe.src = window.location.href; // Open current page URL
            iframe.style.position = 'absolute';
            iframe.style.top = '0';
            iframe.style.left = '0';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            win.document.body.appendChild(iframe);
        }
    </script>

    <script>
        function changeTabTitle(newTitle) {
            document.title = newTitle;  // Change the title of the current tab
        }

function changeFavicon(faviconUrl) {
    var favicon = document.querySelector('link[rel="shortcut icon"]');
    if (favicon) {
        favicon.href = faviconUrl;  // Change the favicon of the current tab
    }
}

        var dropdownActive2 = false;

        function toggleDropdown2() {
            dropdownActive2 = !dropdownActive2;
            var dropdownContent2 = document.querySelector('.dropdown-content2');
            if (dropdownActive2) {
                dropdownContent2.style.display = 'block';
                dropdownContent2.parentElement.classList.add('active');
            } else {
                dropdownContent2.style.display = 'none';
                dropdownContent2.parentElement.classList.remove('active');
            }
        }

        function selectOption(title, faviconUrl) {
            toggleDropdown2();
            changeTabTitle(title);
            changeFavicon(faviconUrl);
        }
