<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="Games & Stuff Logo (1).png" type="image/png">
  <title>Games & Stuff</title>
  <link rel="stylesheet" href="style.css">
  <link href='https://fonts.googleapis.com/css?family=Lato:wght@700' rel='stylesheet' type='text/css'>
</head>
<body>
  <nav>
    <!-- Your navigation content here -->
  </nav>

  <h1>Game List</h1>

  <ul id="gameList"></ul>

  <script>
    // Fetch game information from preload.html
    fetch('preload.html')
      .then(response => response.text())
      .then(data => {
        const parser = new DOMParser();
        const preloadDocument = parser.parseFromString(data, 'text/html');
        const games = preloadDocument.defaultView.games;

        // Populate the game list
        const gameList = document.getElementById('gameList');
        for (const game in games) {
          if (games.hasOwnProperty(game)) {
            const gameInfo = games[game];
            const listItem = document.createElement('li');
            listItem.innerHTML = `
              <a href="${gameInfo.url}">
                <div class="GameContainer">
                  <div class="FrameContainer">
                    <iframe src="${gameInfo.url}" allowfullscreen="true" frameborder="0"></iframe>
                    <div class="GameInfo">
                      <div class="GameTitle">${game}</div>
                      <img class="GameImage" src="${gameInfo.image}" alt="Game Image">
                      <p>${gameInfo.description}</p>
                    </div>
                  </div>
                </div>
              </a>
            `;
            gameList.appendChild(listItem);
          }
        }
      })
      .catch(error => console.error('Error fetching game information:', error));
  </script>

  <script src="/index.js"></script>
</body>
</html>
